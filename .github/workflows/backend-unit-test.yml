name: Backend Unit Test

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

permissions:
  checks: write

jobs:
  unit:
    runs-on: self-hosted
    container:
      image: reneruprecht/ci-java21jdk
      volumes:
        - /opt/gha-cache/m2:/root/.m2
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Unit tests
        working-directory: ${{ inputs.service }}
        run: |
          ./mvnw -B -ntp -e test

      - name: Unit test report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: ${{ inputs.service }}/target/surefire-reports/*.xml
          check_name: ${{inputs.service }} Unit Tests
