name: Main Branch

on:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: self-hosted
    container:
      image: reneruprecht/ci-node24
    outputs:
      task-service: ${{ steps.filter.outputs.task-service }}
    steps:
    - uses: actions/checkout@v6

    - uses: dorny/paths-filter@v4
      id: filter
      with:
        base: main
        filters: |
          task-service:
            - 'task-service/**'

  task-service:
    needs: changes
    if: needs.changes.outputs.task-service == 'true' 
    uses: ./.github/workflows/backend.yml
    with:
      service: "task-service"

