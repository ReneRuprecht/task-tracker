name: Backend

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs:
  unit-test:
    uses: ./.github/workflows/backend-unit-test.yml
    with:
      service: "${{ inputs.service }}"

  integration-test:
    needs: unit-test
    uses: ./.github/workflows/backend-integration-test.yml
    with:
      service: "${{ inputs.service }}"

